name: Update Premier Padel Calendar

on:
  schedule:
    - cron: '*/30 * * * *'   # corre de 30 em 30 minutos
  workflow_dispatch:          # permite correr manualmente

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout do repo
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Setup Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      # 3. Instalar dependências
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Executar script
      - name: Run script
        run: python generate_calendar.py

      # 5. Commit e push automático
      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "Auto-update calendar" || echo "No changes"
          git push
